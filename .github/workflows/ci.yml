name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tools/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tools/**'
      - '.github/workflows/ci.yml'

# Cancel previous runs on the same PR / branch when new commits arrive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.config }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S src -B build -G "Ninja Multi-Config"

      - name: Build ${{ matrix.config }}
        run: cmake --build build --config ${{ matrix.config }}

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OpenSteamTool-${{ matrix.config }}-pr${{ github.event.pull_request.number || github.run_number }}
          path: build/${{ matrix.config }}/
          retention-days: 7

  build-tools-rust:
    name: Build pattern_scanner (Rust)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/pattern_scanner/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tools/pattern_scanner/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        working-directory: tools/pattern_scanner
        run: cargo build --release

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pattern_scanner-${{ github.event.pull_request.number || github.run_number }}
          path: tools/pattern_scanner/target/release/pattern_scanner.exe
          retention-days: 7